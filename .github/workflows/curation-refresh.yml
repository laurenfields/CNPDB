name: curation-refresh

# Regenerates the OFFLINE curation outputs (QC findings + NeuroPep coverage audit)
# whenever the database or the curation tools change, and commits them so
# DataCuration/outputs/ always matches the shipping database. Fast: no network.
#
# The slow, network-bound outputs (new-paper digest, OS/tissue sweep) are handled
# by the monthly literature-mining workflow instead.
on:
  push:
    branches: [main]
    paths:
      - "Assets/**"
      - "DataCuration/*.py"
      - "utils/*.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Regenerate QC findings
        run: python -m DataCuration.cnpdb_qc --out

      - name: Regenerate NeuroPep coverage audit
        run: python -m DataCuration.coverage_audit

      - name: Commit refreshed outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DataCuration/outputs/
          if git diff --cached --quiet; then
            echo "Curation outputs already up to date."
          else
            git commit -m "curation-refresh: regenerate QC + coverage audit outputs"
            git push
          fi
