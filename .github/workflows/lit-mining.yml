name: literature-mining

# Monthly scan for recent crustacean-neuropeptide papers not yet cited in cNPDB.
# Results are committed to DataCuration/lit_scan/ (a dated digest + a persistent
# seen-DOI list), so each run adds only papers that are genuinely new since the
# last scan. Also uploaded as a downloadable artifact.
on:
  schedule:
    - cron: "0 8 1 * *"   # 08:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      since:
        description: "ISO start date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"

permissions:
  contents: write   # allow the job to commit the digest back to the repo

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Discover new papers (incremental)
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          SINCE="${{ github.event.inputs.since || '2025-01-01' }}"
          STAMP="$(date +%F)"
          mkdir -p DataCuration/lit_scan
          python -m DataCuration.lit_mining discover \
            --since "$SINCE" \
            --seen DataCuration/lit_scan/seen_dois.txt \
            --update-seen \
            --out "DataCuration/lit_scan/new_papers_${STAMP}.csv"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DataCuration/lit_scan/
          if git diff --cached --quiet; then
            echo "No new papers this cycle."
          else
            git commit -m "lit-mining: new-paper digest ${STAMP}"
            git push
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cnpdb-new-papers
          path: DataCuration/lit_scan/new_papers_${{ env.STAMP }}.csv
          if-no-files-found: ignore
