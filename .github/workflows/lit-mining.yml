name: literature-mining

# Monthly scan for recent crustacean-neuropeptide papers not yet cited in cNPDB.
# The result is uploaded as a downloadable artifact for a curator to screen.
on:
  schedule:
    - cron: "0 8 1 * *"   # 08:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      since:
        description: "ISO start date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Discover new papers
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          SINCE="${{ github.event.inputs.since || '2025-01-01' }}"
          python -m DataCuration.lit_mining discover --since "$SINCE" --out new_papers.csv
      - uses: actions/upload-artifact@v4
        with:
          name: cnpdb-new-papers
          path: new_papers.csv
