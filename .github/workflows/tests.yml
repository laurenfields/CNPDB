name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests + database integrity gate
        run: python -m pytest -q
      - name: QC summary (non-blocking, for the log)
        run: python -m DataCuration.cnpdb_qc || true

      # If any step above failed, email the notification list -- nobody watches
      # the Actions tab. Skips silently when the mail secret isn't configured.
      - name: Email if tests failed
        if: failure()
        uses: ./.github/actions/notify-email
        with:
          subject: "cNPDB: unit tests FAILED (${{ github.ref_name }})"
          body: |
            The cNPDB automated tests failed after a recent change.

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Run:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Open the run above to see what failed.
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
